# 基于YOLOv8的智能农业病害检测系统 - 全局配置
# ======================================================

# 项目路径
paths:
  project_root: "."
  data_dir: "data"
  raw_data: "data/raw"
  yolo_images_train: "data/yolo/images/train"
  yolo_images_val: "data/yolo/images/val"
  yolo_labels_train: "data/yolo/labels/train"
  yolo_labels_val: "data/yolo/labels/val"
  models_dir: "models/weights"
  exports_dir: "models/exports"

# 数据集配置
dataset:
  source: "PlantDoc-Object-Detection-Dataset"
  repo_url: "https://github.com/pratikkayal/PlantDoc-Object-Detection-Dataset.git"
  num_classes: 17
  train_split: 0.8
  val_split: 0.2
  image_size: 640

# 类别名称 (PlantDoc)
class_names:
  - Apple Scab Leaf
  - Apple leaf
  - Apple rust leaf
  - Bell_pepper leaf
  - Bell_pepper leaf spot
  - Blueberry leaf
  - Cherry leaf
  - Corn Gray leaf spot
  - Corn leaf blight
  - Corn rust leaf
  - Peach leaf
  - Potato leaf
  - Potato leaf early blight
  - Potato leaf late blight
  - Raspberry leaf
  - Soyabean leaf
  - Soybean leaf
  - Squash Powdery mildew leaf
  - Strawberry leaf
  - Tomato Early blight leaf
  - Tomato Septoria leaf spot
  - Tomato leaf
  - Tomato leaf bacterial spot
  - Tomato leaf late blight
  - Tomato leaf mosaic virus
  - Tomato leaf yellow virus
  - Tomato mold leaf
  - Tomato two spotted spider mites leaf
  - grape leaf
  - grape leaf black rot

# YOLOv8训练参数
training:
  model: "yolov8n.pt"       # 预训练权重: n/s/m/l/x
  epochs: 100
  batch_size: 16
  imgsz: 640
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 50              # 早停轮数
  device: 0                 # GPU设备号, 'cpu' 表示CPU
  workers: 4
  augment: true
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1

# 推理配置
inference:
  conf_threshold: 0.25
  iou_threshold: 0.45
  max_det: 100
  device: 0

# 服务配置
server:
  host: "0.0.0.0"
  port: 8000
  max_upload_size_mb: 10
  allowed_extensions: [".jpg", ".jpeg", ".png", ".bmp"]
